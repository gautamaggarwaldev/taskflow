version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: taskflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskmanager
      - JWT_SECRET=change_this_secret_in_production
      - JWT_EXPIRE=7d
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - taskflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow_net

volumes:
  mongo_data:

networks:
  taskflow_net:
    driver: bridge
